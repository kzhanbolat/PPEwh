<!doctype html>
<html lang="{{.Lang}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{index .Data "Title"}}</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="ppe-body">
    <div class="ppe-device">
      <div class="ppe-device-inner">
        <header class="ppe-home-header">
          <div class="mb-4 flex justify-center">
            <img
              src="/logo.png"
              alt="ProSafety Kazakhstan logo"
              class="w-full max-w-[320px] rounded-lg border border-slate-200 bg-white p-2 object-contain"
            />
          </div>
          <h1 class="ppe-home-title">{{index .Data "Title"}}</h1>
        </header>

        <div class="ppe-panel text-center">
          <p class="text-slate-700">{{.Error}}</p>
          <div class="mt-4 flex justify-center gap-2">
            <a class="ppe-btn-filter" href="/?lang={{.Lang}}">{{call .T "back_home"}}</a>
            <a class="ppe-btn-filter" href="/login?lang={{.Lang}}">{{call .T "login"}}</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

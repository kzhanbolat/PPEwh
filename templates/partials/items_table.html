<div id="items-table-wrap" class="mt-6">
  {{if .Error}}
    <div class="mb-4 rounded border border-red-200 bg-red-50 px-3 py-2 text-red-700">
      {{.Error}}
    </div>
  {{end}}
  {{if .Success}}
    <div class="mb-4 rounded border border-green-200 bg-green-50 px-3 py-2 text-green-700">
      {{.Success}}
    </div>
  {{end}}

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="bg-white border rounded-xl p-4">
      <h2 class="text-lg font-semibold mb-3">Current Items</h2>
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm">
          <thead>
            <tr class="text-left text-gray-600">
              <th class="py-2 pr-3">ID</th>
              <th class="py-2 pr-3">Name</th>
              <th class="py-2 pr-3">Size</th>
              <th class="py-2">Quantity</th>
              <th class="py-2 pr-3">Issue Date</th>
              <th class="py-2 pr-3">Expiry Date</th>
            </tr>
          </thead>
          <tbody>
            {{range .Items}}
              <tr class="border-t">
                <td class="py-2 pr-3 font-mono text-xs text-gray-800">{{.ID}}</td>
                <td class="py-2 pr-3">{{.Name}}</td>
                <td class="py-2 pr-3">{{.Size}}</td>
                <td class="py-2 font-semibold">{{.Quantity}}</td>
                <td class="py-2 pr-3 font-mono text-xs text-gray-800">{{.IssueDate}}</td>
                <td class="py-2 pr-3 font-mono text-xs text-gray-800">{{.ExpiryDate}}</td>
              </tr>
            {{end}}
            {{if not .Items}}
              <tr class="border-t">
                <td colspan="6" class="py-4 text-gray-500">No items found.</td>
              </tr>
            {{end}}
          </tbody>
        </table>
      </div>
    </div>

    <div class="bg-white border rounded-xl p-4">
      <h2 class="text-lg font-semibold mb-3">Add Item</h2>
      <form class="space-y-3"
            hx-post="/items"
            hx-target="#items-table-wrap"
            hx-swap="outerHTML"
            method="post">
        <div>
          <label class="block text-sm font-medium mb-1">Name</label>
          <input name="name" class="w-full border rounded px-3 py-2" required />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Size</label>
          <input name="size" class="w-full border rounded px-3 py-2" required />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Quantity</label>
          <input name="quantity" type="number" min="1" value="1" class="w-full border rounded px-3 py-2" required />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Issue Date</label>
          <input name="issue_date" type="date" class="w-full border rounded px-3 py-2" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Expiry Date</label>
          <input name="expiry_date" type="date" class="w-full border rounded px-3 py-2" />
        </div>
        <button class="w-full bg-blue-600 text-white rounded px-4 py-2 hover:bg-blue-700" type="submit">
          Add Item
        </button>
      </form>
    </div>
  </div>
</div>

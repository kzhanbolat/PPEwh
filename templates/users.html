<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{call .T "users"}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <div class="max-w-5xl mx-auto px-4 py-6">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-bold">{{call .T "warehouse_users"}}</h1>
          <p class="text-sm text-gray-600">{{call .T "add_user"}}</p>
        </div>
        <nav class="text-sm">
          <a class="text-blue-600 hover:underline mr-3" href="/?lang={{.Lang}}">Dashboard</a>
          <a class="text-blue-600 hover:underline mr-3" href="/items?lang={{.Lang}}">{{call .T "items"}}</a>
          <a class="text-blue-600 hover:underline mr-3" href="/transactions?lang={{.Lang}}">{{call .T "transactions"}}</a>
          <a class="text-blue-600 hover:underline" href="/users?lang=en">EN</a> |
          <a class="text-blue-600 hover:underline" href="/users?lang=ru">RU</a>
        </nav>
      </div>

      {{template "users_table.html" .}}
    </div>

    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  </body>
</html>

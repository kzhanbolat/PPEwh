<!doctype html>
<html lang="{{.Lang}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{call .T "return_item"}}</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="ppe-body">
    <div class="ppe-device">
      <div class="ppe-device-inner">
        <header class="ppe-page-head">
          <a class="ppe-back" href="/?lang={{.Lang}}" title="{{call .T "title"}}">←</a>
          <h1 class="ppe-page-title">{{call .T "return_item"}}</h1>
          <span aria-hidden="true"></span>
          <p class="ppe-page-sub">{{call .T "issue_transaction"}}</p>
        </header>

        <div class="ppe-lang-row ppe-lang-row--tight">
          <a href="/dashboard?lang={{.Lang}}">{{call .T "dashboard"}}</a>
          <span class="text-slate-300">|</span>
          <a href="/return?lang=en">EN</a>
          <span class="text-slate-300">|</span>
          <a href="/return?lang=ru">RU</a>
        </div>

        {{if .Success}}
          <div class="ppe-alert ppe-alert--success" role="status">{{.Success}}</div>
        {{end}}
        {{if .Error}}
          <div class="ppe-alert ppe-alert--error" role="alert">{{.Error}}</div>
        {{end}}

        <section class="ppe-panel">
          <form class="space-y-1" action="/return" method="post">
            <input type="hidden" name="lang" value="{{.Lang}}" />

            <div class="ppe-field">
              <button type="button" class="ppe-section-bar">
                <span class="ppe-section-bar-icon" aria-hidden="true"></span>
                <span>{{call .T "issue_transaction"}}</span>
              </button>
              <select name="transaction_id" class="ppe-select" required>
                <option value="">{{call .T "select_issued_transaction"}}</option>
                {{range .Data.ReturnIssueOptions}}
                  <option value="{{.TransactionID}}" title="{{.Label}}" {{if eq .TransactionID $.Data.ReturnForm.TransactionID}}selected{{end}}>{{.Label}}</option>
                {{end}}
              </select>
            </div>

            <div class="ppe-field">
              <label for="return-qty">{{call .T "quantity_returned"}}</label>
              <input id="return-qty" name="quantity" type="number" min="1" value="{{if .Data.ReturnForm.QuantityReturned}}{{.Data.ReturnForm.QuantityReturned}}{{else}}1{{end}}" class="ppe-input" required />
            </div>

            <div class="ppe-field">
              <button type="button" class="ppe-section-bar">
                <span class="ppe-section-bar-icon" aria-hidden="true"></span>
                <span>{{call .T "issued_to_employee"}}</span>
              </button>
              <input
                id="returned-by-name"
                name="returned_by_user_name"
                type="text"
                class="ppe-input"
                list="return-employee-name-options"
                autocomplete="off"
                placeholder="{{call .T "user_name"}}"
                value="{{.Data.ReturnForm.ReturnedByUserName}}"
                required
              />
              <datalist id="return-employee-name-options">
                {{range .Data.IssuedToUsers}}
                  <option value="{{.Name}}"></option>
                {{end}}
              </datalist>
              <p class="ppe-muted-note">{{call .T "employee_name_roster_hint"}}</p>
            </div>

            <div class="ppe-field">
              <button type="button" class="ppe-section-bar">
                <span class="ppe-section-bar-icon" aria-hidden="true"></span>
                <span>{{call .T "received_by_warehouse"}}</span>
              </button>
              <input type="hidden" name="received_by_user_id" value="{{.Data.CurrentWarehouseUserID}}" />
              <input type="text" class="ppe-input" value="{{.Data.CurrentWarehouseUserName}}" readonly />
            </div>

            <div class="ppe-form-actions">
              <button class="ppe-btn-cta" type="submit">{{call .T "record_return"}}</button>
            </div>
          </form>
        </section>
      </div>
    </div>
  </body>
</html>

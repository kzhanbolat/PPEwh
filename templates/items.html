<!doctype html>
<html lang="{{.Lang}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{call .T "items"}}</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="ppe-body">
    <div class="ppe-device">
      <div class="ppe-device-inner">
        <header class="ppe-page-head">
          <a class="ppe-back" href="/?lang={{.Lang}}" title="{{call .T "title"}}">←</a>
          <h1 class="ppe-page-title">{{call .T "items"}}</h1>
          <a class="ppe-head-action" href="/items/export?lang={{.Lang}}">{{call .T "download_excel"}}</a>
          <p class="ppe-page-sub">{{call .T "add_item"}}</p>
        </header>

        <div class="ppe-lang-row ppe-lang-row--tight">
          <a href="/dashboard?lang={{.Lang}}">{{call .T "dashboard"}}</a>
          <span class="text-slate-300">|</span>
          <a href="/items?lang=en">EN</a>
          <span class="text-slate-300">|</span>
          <a href="/items?lang=ru">RU</a>
        </div>

        {{template "items_table.html" .}}
      </div>
    </div>

    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  </body>
</html>

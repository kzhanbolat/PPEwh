<!doctype html>
<html lang="{{.Lang}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{call .T "title"}}</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="ppe-body">
    <div class="ppe-device">
      <div class="ppe-device-inner">
        <header class="ppe-home-header">
          <div class="ppe-brand-mark" aria-hidden="true">PS</div>
          <h1 class="ppe-home-title">{{call .T "dashboard_title"}}</h1>
          <p class="ppe-home-sub">{{call .T "dashboard_subtitle"}}</p>
        </header>

        <div class="ppe-lang-row ppe-lang-row--tight">
          <a href="/admin/access?lang={{.Lang}}">{{call .T "admin_access"}}</a>
          <span class="text-slate-300">|</span>
          <a href="/dashboard?lang={{.Lang}}">{{call .T "dashboard"}}</a>
          <span class="text-slate-300">|</span>
          <a href="/?lang=en">EN</a>
          <span class="text-slate-300">|</span>
          <a href="/?lang=ru">RU</a>
          <span class="text-slate-300">|</span>
          <form method="POST" action="/logout?lang={{.Lang}}" class="inline">
            <button type="submit" class="bg-transparent p-0 text-blue-600 font-semibold hover:underline">{{call .T "logout"}}</button>
          </form>
        </div>

        <section class="ppe-hub" aria-label="Dashboard actions">
          <div class="mb-4 flex justify-center">
            <img
              src="/logo.png"
              alt="ProSafety Kazakhstan logo"
              class="w-full max-w-[320px] rounded-lg border border-slate-200 bg-white p-2 object-contain"
            />
          </div>
          <div class="ppe-hub-actions">
            <a class="ppe-btn-hub" href="/issue?lang={{.Lang}}">{{call .T "issue_ppe"}}</a>
            <a class="ppe-btn-hub" href="/return?lang={{.Lang}}">{{call .T "return_ppe"}}</a>
            <a class="ppe-btn-hub" href="/transactions?lang={{.Lang}}">{{call .T "view_transactions"}}</a>
            <a class="ppe-btn-hub" href="/employees?lang={{.Lang}}">{{call .T "employees"}}</a>
            <a class="ppe-btn-hub" href="/items?lang={{.Lang}}">{{call .T "items"}}</a>
            <a class="ppe-btn-hub" href="/dashboard?lang={{.Lang}}">{{call .T "dashboard"}}</a>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>

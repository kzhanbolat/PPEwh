<!doctype html>
<html lang="{{.Lang}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{call .T "transactions_title"}}</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="ppe-body">
    <div class="ppe-device">
      <div class="ppe-device-inner">
        <header class="ppe-page-head">
          <a class="ppe-back" href="/?lang={{.Lang}}" title="{{call .T "title"}}">←</a>
          <h1 class="ppe-page-title">{{call .T "transactions_title"}}</h1>
          <a class="ppe-head-action" href="/transactions/export?lang={{.Lang}}">{{call .T "download_excel"}}</a>
          <p class="ppe-page-sub">{{call .T "transactions_subtitle"}}</p>
        </header>

        <div class="ppe-lang-row ppe-lang-row--tight">
          <a href="/dashboard?lang={{.Lang}}">{{call .T "dashboard"}}</a>
          <span class="text-slate-300">|</span>
          <a href="/transactions?lang=en">EN</a>
          <span class="text-slate-300">|</span>
          <a href="/transactions?lang=ru">RU</a>
        </div>

        <form method="GET" action="/transactions" class="ppe-filters">
          <input type="hidden" name="lang" value="{{.Lang}}" />

          <div class="ppe-section-bar ppe-section-bar--static">
            <span class="ppe-section-bar-icon" aria-hidden="true"></span>
            <span>{{call .T "filter"}}</span>
          </div>

          <div class="ppe-filter-row">
            <input type="text" name="user_name" placeholder="{{call .T "user_name"}}" class="ppe-input" />
            <input type="text" name="issued_by" placeholder="{{call .T "issued_by"}}" class="ppe-input" />
            <input type="text" name="item_name" placeholder="{{call .T "item_name"}}" class="ppe-input" />
          </div>

          <div class="ppe-filter-row">
            <select name="type" class="ppe-select">
              <option value="">{{call .T "all"}}</option>
              <option value="ISSUE">{{call .T "issue"}}</option>
              <option value="RETURN">{{call .T "return"}}</option>
            </select>
          </div>

          <button type="submit" class="ppe-btn-filter">{{call .T "filter"}}</button>
        </form>

        <div id="transactions-table-wrap">
          {{template "transactions_table.html" .}}
        </div>
      </div>
    </div>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  </body>
</html>

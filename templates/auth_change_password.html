<!doctype html>
<html lang="{{.Lang}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{call .T "change_password"}}</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="ppe-body">
    <div class="ppe-device">
      <div class="ppe-device-inner">
        <header class="ppe-home-header">
          <h1 class="ppe-home-title">{{call .T "change_password"}}</h1>
          <p class="ppe-home-sub">{{call .T "change_password_subtitle"}}</p>
        </header>

        {{if .Success}}
          <div class="ppe-alert ppe-alert--success">{{.Success}}</div>
        {{end}}
        {{if .Error}}
          <div class="ppe-alert ppe-alert--error">{{.Error}}</div>
        {{end}}

        <div class="ppe-panel">
          <form method="POST" action="/change-password?lang={{.Lang}}" class="space-y-3">
            <input type="hidden" name="lang" value="{{.Lang}}" />
            <div class="ppe-field !mb-0">
              <label for="current-password">{{call .T "current_password"}}</label>
              <input id="current-password" type="password" name="current_password" class="ppe-input" required />
            </div>
            <div class="ppe-field !mb-0">
              <label for="new-password">{{call .T "new_password"}}</label>
              <input id="new-password" type="password" name="new_password" class="ppe-input" required />
            </div>
            <div class="ppe-form-actions !mt-0">
              <button type="submit" class="ppe-btn-filter">{{call .T "save"}}</button>
            </div>
          </form>
          <form method="POST" action="/logout?lang={{.Lang}}" class="mt-3">
            <button type="submit" class="ppe-btn-filter">{{call .T "logout"}}</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
